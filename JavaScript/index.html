<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Learning JavaScript</title>
    <style>
        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html,body{
            height: 100%;
            width: 100%;
            background-color: #222;
            font-family: Gilroy;
        }
        .main{
            display: flex;
            align-items: center;
            justify-content: center;
            color: rgb(103, 100, 106);
            height: 100%;
            width: 100%;
            font-size: 40px;
        }

        #inputfile{
            display: none;
        }
        .main #btn{
            padding: 12px 22px;
            background-color: rgb(19, 179, 80);
            border-radius: 10px;
            color: white;
            user-select: none;

        }

        #btn:hover{
            background-color: rgb(134, 186, 23);
        }

    </style>
    
</head>
<body>

    <div class="main">
        <!-- <h1>shalini</h1> -->
         <input id="inputfile" type="file">
         <div id="btn">
            Upload file
         </div>
    </div>
    <script src="js/testing.js"></script>
    

</body>
</html>
